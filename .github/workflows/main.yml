# Produces a downloadable filesystem-mirror tree for hashicorp/local (~> 2.0).
# Use when you cannot run `terraform providers mirror` locally (TLS issues).
# Extract the artifact under infra/images/terraform-lab-base/bundled/ then:
#   docker build --build-arg PREBUILT_TERRAFORM_MIRROR=true ...
name: terraform-mirror-artifact

on: workflow_dispatch

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate provider mirror
        run: |
          set -eux
          mkdir -p work mirror
          cat > work/main.tf <<'EOF'
          terraform {
            required_providers {
              local = {
                source  = "hashicorp/local"
                version = "~> 2.0"
              }
            }
          }
          EOF
          # Image ENTRYPOINT is `terraform` — pass subcommands only (not `sh -c`).
          docker run --rm \
            -v "$GITHUB_WORKSPACE/work:/work" \
            -v "$GITHUB_WORKSPACE/mirror:/mirror" \
            -w /work \
            hashicorp/terraform:1.7.5 \
            init -input=false
          docker run --rm \
            -v "$GITHUB_WORKSPACE/work:/work" \
            -v "$GITHUB_WORKSPACE/mirror:/mirror" \
            -w /work \
            hashicorp/terraform:1.7.5 \
            providers mirror /mirror
          test -d mirror/registry.terraform.io
          ( cd mirror && tar -czf "$GITHUB_WORKSPACE/terraform-filesystem-mirror.tgz" . )

      - uses: actions/upload-artifact@v4
        with:
          name: terraform-filesystem-mirror
          path: terraform-filesystem-mirror.tgz
